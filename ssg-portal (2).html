<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSG Portal — Supreme Student Government</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue-900:#0c2a52;
  --blue-800:#123a72;
  --blue-700:#1b4f9c;
  --blue-600:#2563ba;
  --blue-100:#e6f0fb;
  --blue-050:#f4f8fc;
  --sky-400:#4fa8e0;
  --sky-300:#8cc7ec;
  --ink:#0f2540;
  --ink-soft:#4a5d75;
  --white:#ffffff;
  --amber:#c8791f;
  --amber-bg:#fbeed9;
  --green:#1f8a5c;
  --green-bg:#e2f5eb;
  --red:#c23b3b;
  --red-bg:#fbe6e6;
  --line:#dbe6f3;
  --shadow-sm:0 1px 3px rgba(15,37,64,.08);
  --shadow-md:0 8px 24px rgba(15,37,64,.10);
  --shadow-lg:0 20px 48px rgba(15,37,64,.16);
  --radius:16px;
  --radius-sm:10px;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  font-family:var(--font-body);
  color:var(--ink);
  background:var(--blue-050);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--font-display); margin:0; color:var(--blue-900);}
p{margin:0;}
a{color:inherit; text-decoration:none;}
button{font-family:var(--font-body); cursor:pointer;}
img{max-width:100%;}
.eyebrow{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  font-weight:600;
  color:var(--sky-400);
}
.wrap{max-width:1180px; margin:0 auto; padding:0 24px;}
::selection{background:var(--sky-300); color:var(--blue-900);}
:focus-visible{outline:3px solid var(--amber); outline-offset:2px;}
@media (prefers-reduced-motion: reduce){ *{animation-duration:.001ms !important; transition-duration:.001ms !important;} }

/* ---------- NAV ---------- */
.navbar{
  position:sticky; top:0; z-index:100;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.nav-inner{
  max-width:1180px; margin:0 auto; padding:14px 24px;
  display:flex; align-items:center; justify-content:space-between; gap:20px;
}
.brand{display:flex; align-items:center; gap:12px;}
.crest{
  width:44px; height:44px; border-radius:50%;
  background:#fff;
  display:flex; align-items:center; justify-content:center;
  box-shadow:var(--shadow-sm);
  flex-shrink:0;
  padding:3px;
  border:1px solid var(--line);
  overflow:hidden;
}
.crest img{width:100%; height:100%; object-fit:contain;}
.brand-text{display:flex; flex-direction:column; line-height:1.15;}
.brand-text strong{font-family:var(--font-display); font-size:16px; color:var(--blue-900);}
.brand-text span{font-size:11px; color:var(--ink-soft); font-family:var(--font-mono); letter-spacing:.05em;}
.nav-links{display:flex; align-items:center; gap:4px;}
.nav-links button{
  background:none; border:none; padding:9px 14px; border-radius:999px;
  font-size:14.5px; font-weight:600; color:var(--ink-soft);
  transition:background .15s, color .15s;
}
.nav-links button:hover{background:var(--blue-100); color:var(--blue-700);}
.nav-links button.active{background:var(--blue-700); color:#fff;}
.nav-cta{display:flex; align-items:center; gap:10px;}
.btn{
  border:none; border-radius:999px; padding:10px 18px; font-weight:700; font-size:14px;
  transition:transform .12s ease, box-shadow .12s ease, background .15s;
  display:inline-flex; align-items:center; gap:8px;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--blue-700); color:#fff; box-shadow:var(--shadow-sm);}
.btn-primary:hover{background:var(--blue-800); box-shadow:var(--shadow-md);}
.btn-ghost{background:transparent; color:var(--blue-700); border:1.5px solid var(--blue-700);}
.btn-ghost:hover{background:var(--blue-100);}
.btn-sm{padding:7px 13px; font-size:12.5px;}
.btn-danger{background:var(--red-bg); color:var(--red);}
.hamburger{display:none; background:none; border:none; padding:8px;}
.hamburger span{display:block; width:22px; height:2px; background:var(--blue-900); margin:5px 0; border-radius:2px;}

/* ---------- HERO / FEATURED ---------- */
.hero-section{padding:44px 0 8px;}
.featured-card{
  position:relative;
  background:linear-gradient(120deg, var(--blue-900) 0%, var(--blue-700) 55%, var(--sky-400) 130%);
  border-radius:24px; overflow:hidden;
  padding:44px 40px;
  color:#fff;
  box-shadow:var(--shadow-lg);
  animation:fadeUp .6s ease both;
}
.featured-card::before{
  content:'';
  position:absolute; right:-60px; top:-60px; width:280px; height:280px; border-radius:50%;
  border:1px solid rgba(255,255,255,.15);
}
.featured-card::after{
  content:'';
  position:absolute; right:20px; top:40px; width:180px; height:180px; border-radius:50%;
  border:1px solid rgba(255,255,255,.12);
}
.seal{
  position:absolute; top:32px; right:36px;
  width:84px; height:84px; border-radius:50%;
  border:2px dashed rgba(255,255,255,.55);
  display:flex; align-items:center; justify-content:center;
  text-align:center; padding:8px;
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase;
  color:#fff; font-weight:600; line-height:1.3;
  transform:rotate(8deg);
}
.featured-top{display:flex; align-items:center; gap:10px; margin-bottom:18px;}
.pulse-dot{width:8px; height:8px; border-radius:50%; background:#ffd166; animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1} 50%{opacity:.35}}
.featured-eyebrow{font-family:var(--font-mono); font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#ffe9b8; font-weight:600;}
.featured-card h1{font-size:clamp(24px,3.4vw,38px); color:#fff; max-width:640px; line-height:1.15; margin-bottom:14px;}
.featured-card p.desc{color:rgba(255,255,255,.86); max-width:600px; font-size:15.5px; line-height:1.6; margin-bottom:22px;}
.featured-meta{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:26px;}
.badge{
  display:inline-flex; align-items:center; gap:6px;
  padding:5px 12px; border-radius:999px; font-size:11.5px; font-weight:700;
  font-family:var(--font-mono); letter-spacing:.03em; text-transform:uppercase;
}
.badge-onfeatured{background:rgba(255,255,255,.16); color:#fff; border:1px solid rgba(255,255,255,.3);}
.badge-high{background:var(--amber-bg); color:var(--amber);}
.badge-medium{background:var(--blue-100); color:var(--blue-700);}
.badge-normal{background:#eef1f5; color:var(--ink-soft);}
.badge-ssg{background:#dff0e5; color:var(--green);}
.badge-school{background:var(--blue-100); color:var(--blue-700);}
.badge-club{background:#f3e8fb; color:#7a3ca8;}
@keyframes fadeUp{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}
.featured-photo{
  display:none;
  width:150px; height:150px; object-fit:cover; border-radius:16px;
  position:absolute; right:36px; bottom:32px;
  border:3px solid rgba(255,255,255,.5); box-shadow:var(--shadow-lg);
}
@media (min-width:860px){
  .featured-photo{display:block;}
  .featured-card:has(.featured-photo){padding-right:220px;}
}

/* ---------- SECTION HEADERS ---------- */
.section{padding:52px 0;}
.section-head{display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:26px; gap:16px; flex-wrap:wrap;}
.section-head h2{font-size:clamp(21px,2.6vw,28px);}
.section-head .sub{color:var(--ink-soft); font-size:14px; margin-top:4px;}

/* ---------- CATEGORY CARDS ---------- */
.cat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}
.cat-card{
  background:#fff; border-radius:var(--radius); padding:28px 24px; border:1px solid var(--line);
  box-shadow:var(--shadow-sm); transition:transform .18s ease, box-shadow .18s ease;
  cursor:pointer; display:flex; flex-direction:column; gap:12px;
}
.cat-card:hover{transform:translateY(-4px); box-shadow:var(--shadow-md); border-color:var(--sky-300);}
.cat-icon{
  width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center;
  font-size:24px; background:var(--blue-100);
}
.cat-card h3{font-size:18px;}
.cat-card .cdesc{color:var(--ink-soft); font-size:13.5px; line-height:1.55;}
.cat-count{font-family:var(--font-mono); font-size:12px; color:var(--blue-700); font-weight:600;}
.cat-card .btn{margin-top:auto; align-self:flex-start;}

/* ---------- ANNOUNCEMENT LIST / CARDS ---------- */
.ann-toolbar{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:22px; align-items:center;}
.input, select.input{
  border:1.5px solid var(--line); border-radius:10px; padding:10px 14px; font-size:14px;
  font-family:var(--font-body); background:#fff; color:var(--ink);
}
.input:focus{border-color:var(--blue-600);}
.search-box{position:relative; flex:1; min-width:220px;}
.search-box input{width:100%; padding-left:36px;}
.search-box .icon{position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.5; font-size:14px;}
.ann-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px;}
.ann-card{
  background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:20px;
  display:flex; flex-direction:column; gap:10px; box-shadow:var(--shadow-sm);
  transition:box-shadow .15s, transform .15s;
}
.ann-card:hover{box-shadow:var(--shadow-md); transform:translateY(-2px);}
.ann-card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
.ann-card h4{font-size:16px; line-height:1.35;}
.ann-date{font-family:var(--font-mono); font-size:11.5px; color:var(--ink-soft);}
.ann-excerpt{color:var(--ink-soft); font-size:13.5px; line-height:1.55; flex:1;}
.ann-card-bottom{display:flex; justify-content:space-between; align-items:center; margin-top:4px;}
.ann-actions{display:flex; gap:6px;}
.empty-state{
  text-align:center; padding:60px 20px; color:var(--ink-soft); border:1.5px dashed var(--line);
  border-radius:var(--radius); background:#fff;
}
.empty-state .glyph{font-size:34px; margin-bottom:10px;}
.pagination{display:flex; justify-content:center; gap:6px; margin-top:26px;}
.pg-btn{width:34px; height:34px; border-radius:8px; border:1px solid var(--line); background:#fff; font-weight:700; font-size:13px;}
.pg-btn.active{background:var(--blue-700); color:#fff; border-color:var(--blue-700);}

/* ---------- CALENDAR ---------- */
.cal-wrap{display:grid; grid-template-columns:1.4fr 1fr; gap:22px;}
.cal-card{background:#fff; border-radius:var(--radius); border:1px solid var(--line); box-shadow:var(--shadow-sm); padding:22px;}
.cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
.cal-head h3{font-size:17px;}
.cal-nav{display:flex; gap:6px;}
.cal-nav button{width:32px; height:32px; border-radius:8px; border:1px solid var(--line); background:#fff; font-size:14px;}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; text-align:center;}
.cal-dow{font-family:var(--font-mono); font-size:10.5px; color:var(--ink-soft); padding:4px 0; letter-spacing:.05em;}
.cal-day{
  aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:9px;
  font-size:13px; position:relative; cursor:default; color:var(--ink);
}
.cal-day.blank{visibility:hidden;}
.cal-day.has-event{background:var(--blue-100); color:var(--blue-700); font-weight:700; cursor:pointer;}
.cal-day.has-event::after{content:''; position:absolute; bottom:4px; width:4px; height:4px; border-radius:50%; background:var(--blue-700);}
.cal-day.today{outline:2px solid var(--amber);}
.agenda-item{
  display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--line); cursor:pointer;
}
.agenda-item:last-child{border-bottom:none;}
.agenda-date{
  font-family:var(--font-mono); font-size:11px; color:var(--blue-700); font-weight:700;
  background:var(--blue-100); border-radius:8px; padding:6px 9px; text-align:center; min-width:52px; height:fit-content;
}
.agenda-title{font-size:14px; font-weight:600; margin-bottom:2px;}
.agenda-desc{font-size:12.5px; color:var(--ink-soft); line-height:1.4;}

/* ---------- FINANCIAL ---------- */
.fin-toolbar{display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap;}
.fin-table{width:100%; border-collapse:collapse; background:#fff; border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-sm);}
.fin-table th{
  text-align:left; font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.06em;
  color:var(--ink-soft); background:var(--blue-050); padding:12px 16px; border-bottom:1px solid var(--line);
}
.fin-table td{padding:14px 16px; border-bottom:1px solid var(--line); font-size:14px;}
.fin-table tr:last-child td{border-bottom:none;}
.fin-seal{
  display:inline-flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:50%;
  border:1.5px dashed var(--blue-700); color:var(--blue-700); font-size:12px; margin-right:8px; flex-shrink:0;
}

/* ---------- FOOTER ---------- */
footer{background:var(--blue-900); color:#cddcf0; padding:48px 0 24px; margin-top:40px;}
.footer-grid{display:grid; grid-template-columns:2fr 1fr 1fr; gap:32px; margin-bottom:32px;}
footer h4{color:#fff; font-size:14px; margin-bottom:12px;}
footer .brand-text strong{color:#fff;}
footer .brand-text span{color:#9fb6d6;}
.footer-links a{display:block; padding:5px 0; font-size:13.5px; color:#b7c9e3; transition:color .15s;}
.footer-links a:hover{color:#fff;}
.footer-bottom{border-top:1px solid rgba(255,255,255,.12); padding-top:18px; font-size:12.5px; color:#8fa6c9; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;}

/* ---------- LOGIN ---------- */
.login-shell{min-height:calc(100vh - 70px); display:flex; align-items:center; justify-content:center; padding:40px 20px;}
.login-card{
  background:#fff; border-radius:20px; box-shadow:var(--shadow-lg); padding:40px; width:100%; max-width:400px;
  border:1px solid var(--line);
}
.login-card .crest{width:52px; height:52px; margin:0 auto 16px; font-size:18px;}
.login-card h2{text-align:center; margin-bottom:6px;}
.login-card .sub{text-align:center; color:var(--ink-soft); font-size:13.5px; margin-bottom:26px;}
.field{margin-bottom:16px;}
.field label{display:block; font-size:12.5px; font-weight:700; margin-bottom:6px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.04em; font-family:var(--font-mono);}
.field .input{width:100%;}
.demo-accounts{margin-top:22px; padding-top:18px; border-top:1px solid var(--line);}
.demo-accounts .lbl{font-size:11.5px; color:var(--ink-soft); margin-bottom:10px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.05em;}
.demo-btn{
  display:flex; align-items:center; justify-content:space-between; width:100%; padding:10px 12px;
  border:1px solid var(--line); border-radius:10px; background:var(--blue-050); margin-bottom:8px; font-size:13px; font-weight:600;
}
.demo-btn:hover{background:var(--blue-100);}
.error-msg{background:var(--red-bg); color:var(--red); font-size:13px; padding:10px 14px; border-radius:8px; margin-bottom:14px;}

/* ---------- DASHBOARD ---------- */
.dash-shell{display:grid; grid-template-columns:230px 1fr; min-height:calc(100vh - 70px);}
.sidebar{background:#fff; border-right:1px solid var(--line); padding:24px 14px;}
.side-user{display:flex; gap:10px; align-items:center; padding:0 8px 18px; margin-bottom:14px; border-bottom:1px solid var(--line);}
.avatar{width:38px; height:38px; border-radius:50%; background:var(--blue-700); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0;}
.side-user .name{font-size:13.5px; font-weight:700;}
.side-user .role{font-size:11px; color:var(--ink-soft); font-family:var(--font-mono);}
.side-link{
  display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; font-size:13.5px; font-weight:600;
  color:var(--ink-soft); margin-bottom:2px; background:none; border:none; width:100%; text-align:left;
}
.side-link:hover{background:var(--blue-050);}
.side-link.active{background:var(--blue-700); color:#fff;}
.dash-main{padding:28px 32px; max-width:980px;}
.dash-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:22px; flex-wrap:wrap; gap:12px;}
.stat-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:28px;}
.stat-card{background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; box-shadow:var(--shadow-sm);}
.stat-card .num{font-family:var(--font-display); font-size:26px; color:var(--blue-900);}
.stat-card .lbl{font-size:12px; color:var(--ink-soft); margin-top:2px;}
.table-card{background:#fff; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-sm);}
.dash-table{width:100%; border-collapse:collapse;}
.dash-table th{text-align:left; padding:11px 16px; font-size:11px; font-family:var(--font-mono); text-transform:uppercase; color:var(--ink-soft); background:var(--blue-050); border-bottom:1px solid var(--line);}
.dash-table td{padding:12px 16px; font-size:13.5px; border-bottom:1px solid var(--line);}
.dash-table tr:last-child td{border-bottom:none;}

/* ---------- MODAL ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(12,42,82,.5); display:none; align-items:center; justify-content:center;
  z-index:1000; padding:20px; backdrop-filter:blur(2px);
}
.overlay.open{display:flex;}
.modal{
  background:#fff; border-radius:18px; max-width:560px; width:100%; max-height:88vh; overflow-y:auto;
  padding:30px; box-shadow:var(--shadow-lg); animation:modalIn .2s ease both;
}
@keyframes modalIn{from{opacity:0; transform:translateY(8px) scale(.98);} to{opacity:1; transform:translateY(0) scale(1);}}
.modal-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; gap:12px;}
.modal-close{background:var(--blue-050); border:none; width:30px; height:30px; border-radius:50%; font-size:15px; flex-shrink:0;}
.form-row{margin-bottom:14px;}
.form-row label{display:block; font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:.03em; font-family:var(--font-mono);}
.form-row .input, .form-row textarea, .form-row select{width:100%;}
.form-row textarea{font-family:var(--font-body); border:1.5px solid var(--line); border-radius:10px; padding:10px 14px; font-size:14px; resize:vertical; min-height:90px;}
.pill-select{display:flex; gap:8px; flex-wrap:wrap;}
.pill-opt{padding:8px 14px; border-radius:999px; border:1.5px solid var(--line); font-size:13px; font-weight:600; background:#fff;}
.pill-opt.sel{background:var(--blue-700); color:#fff; border-color:var(--blue-700);}
.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--blue-900); color:#fff;
  padding:12px 22px; border-radius:999px; font-size:13.5px; font-weight:600; box-shadow:var(--shadow-lg); z-index:1200;
  opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(-8px);}

/* ---------- PAGE HEADER (category / other pages) ---------- */
.page-hero{background:var(--blue-800); color:#fff; padding:38px 0;}
.page-hero .wrap{display:flex; align-items:center; gap:16px;}
.back-link{background:rgba(255,255,255,.14); border:none; color:#fff; width:36px; height:36px; border-radius:50%; font-size:16px;}
.page-hero h1{color:#fff; font-size:24px;}
.page-hero p{color:rgba(255,255,255,.75); font-size:13.5px; margin-top:4px;}

@media (max-width:880px){
  .cat-grid{grid-template-columns:1fr;}
  .cal-wrap{grid-template-columns:1fr;}
  .footer-grid{grid-template-columns:1fr; gap:20px;}
  .dash-shell{grid-template-columns:1fr;}
  .sidebar{display:flex; overflow-x:auto; gap:6px; padding:12px; border-right:none; border-bottom:1px solid var(--line);}
  .side-user{display:none;}
  .side-link{white-space:nowrap; width:auto;}
  .stat-row{grid-template-columns:repeat(2,1fr);}
}
@media (max-width:720px){
  .nav-links{display:none;}
  .hamburger{display:block;}
  .nav-links.mobile-open{
    display:flex; flex-direction:column; position:absolute; top:64px; left:0; right:0; background:#fff;
    padding:14px 20px; border-bottom:1px solid var(--line); box-shadow:var(--shadow-md);
  }
  .nav-links.mobile-open button{width:100%; text-align:left;}
  .featured-card{padding:30px 22px;}
  .seal{width:64px; height:64px; font-size:8px; top:20px; right:20px;}
  .stat-row{grid-template-columns:1fr 1fr;}
}

/* ---------- EVENT STATUS BADGES ---------- */
.badge-upcoming{background:#e2f5eb; color:var(--green);}
.badge-ongoing{background:var(--amber-bg); color:var(--amber);}
.badge-completed{background:#eef1f5; color:var(--ink-soft);}
.status-dot{display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px;}
.status-dot.upcoming{background:var(--green);}
.status-dot.ongoing{background:var(--amber); animation:pulse 1.8s infinite;}
.status-dot.completed{background:var(--ink-soft);}

/* ---------- ARCHIVE ---------- */
.badge-archived{background:#eee; color:#8a97a8;}
.archive-toggle{display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--ink-soft); cursor:pointer; user-select:none;}

/* ---------- ANNOUNCEMENT BACKGROUND SWATCHES ---------- */
.swatch-row{display:flex; gap:8px; flex-wrap:wrap;}
.swatch{
  width:32px; height:32px; border-radius:9px; border:2px solid transparent; cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:13px;
}
.swatch.sel{border-color:var(--blue-700); box-shadow:0 0 0 2px var(--blue-100);}
.ann-card.bg-blue{background:linear-gradient(145deg,#eaf3fd,#ffffff);}
.ann-card.bg-amber{background:linear-gradient(145deg,#fdf3e3,#ffffff);}
.ann-card.bg-green{background:linear-gradient(145deg,#e5f6ec,#ffffff);}
.ann-card.bg-purple{background:linear-gradient(145deg,#f4eafc,#ffffff);}
.ann-card.bg-rose{background:linear-gradient(145deg,#fceaf0,#ffffff);}

/* ---------- TYPE TOGGLE ---------- */
.type-toggle{display:flex; gap:8px; margin-bottom:16px;}
.type-toggle button{
  flex:1; padding:12px; border-radius:12px; border:1.5px solid var(--line); background:#fff;
  font-weight:700; font-size:13.5px; display:flex; flex-direction:column; align-items:center; gap:2px;
}
.type-toggle button span.sub{font-weight:500; font-size:11px; color:var(--ink-soft);}
.type-toggle button.sel{border-color:var(--blue-700); background:var(--blue-100); color:var(--blue-700);}
.type-toggle button.sel span.sub{color:var(--blue-700);}
.field-2col{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

/* ---------- MEMORIES ---------- */
.mem-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:20px;}
.mem-card{
  background:#fff; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;
  box-shadow:var(--shadow-sm); transition:transform .18s ease, box-shadow .18s ease; cursor:pointer;
  display:flex; flex-direction:column;
}
.mem-card:hover{transform:translateY(-4px); box-shadow:var(--shadow-md);}
.mem-cover{width:100%; height:150px; object-fit:cover; background:var(--blue-100);}
.mem-body{padding:16px; display:flex; flex-direction:column; gap:6px; flex:1;}
.mem-body h4{font-size:15.5px; line-height:1.3;}
.mem-meta{display:flex; gap:8px; align-items:center; font-size:11.5px; color:var(--ink-soft); font-family:var(--font-mono);}
.mem-count{margin-top:auto; font-size:12px; color:var(--blue-700); font-weight:700;}
.mem-actions{display:flex; gap:6px; padding:0 16px 16px;}
.recent-mem-strip{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px;}
.gallery-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-top:16px;}
.gallery-grid img{width:100%; height:110px; object-fit:cover; border-radius:10px; cursor:zoom-in; transition:transform .15s;}
.gallery-grid img:hover{transform:scale(1.03);}
.lightbox-overlay{
  position:fixed; inset:0; background:rgba(10,20,35,.92); z-index:1400; display:none;
  align-items:center; justify-content:center; padding:30px;
}
.lightbox-overlay.open{display:flex;}
.lightbox-overlay img{max-width:90vw; max-height:85vh; border-radius:10px; box-shadow:var(--shadow-lg);}
.lightbox-close{position:absolute; top:20px; right:26px; background:rgba(255,255,255,.15); color:#fff; border:none; width:38px; height:38px; border-radius:50%; font-size:18px;}
.lightbox-nav{position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,.15); color:#fff; border:none; width:44px; height:44px; border-radius:50%; font-size:20px;}
.lightbox-prev{left:20px;} .lightbox-next{right:20px;}
.photo-upload-drop{border:1.5px dashed var(--line); border-radius:12px; padding:14px; text-align:center; font-size:13px; color:var(--ink-soft);}
.photo-thumb-row{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
.photo-thumb{position:relative; width:70px; height:70px; border-radius:8px; overflow:hidden; border:1px solid var(--line);}
.photo-thumb img{width:100%; height:100%; object-fit:cover;}
.photo-thumb .rm{position:absolute; top:2px; right:2px; background:rgba(0,0,0,.55); color:#fff; border:none; width:18px; height:18px; border-radius:50%; font-size:11px; line-height:1;}

/* ---------- FOOTER SOCIAL ---------- */
.footer-social{display:flex; gap:10px; margin-top:14px;}
.footer-social a{
  width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.08); display:flex; align-items:center;
  justify-content:center; font-size:15px; border:1px solid rgba(255,255,255,.15);
}
.footer-social a:hover{background:rgba(255,255,255,.18);}
.footer-edit-link{background:none; border:none; color:#7d9bc4; font-size:12px; text-decoration:underline; cursor:pointer; margin-top:10px;}

/* ---------- COLOR/DATE INPUT ROW ---------- */
.duration-row{display:flex; gap:8px; align-items:center;}
.duration-row select{flex:1;}
</style>
</head>

    {id:'a1', type:'event', title:'Foundation Week 2026: Full Schedule Released', content:'The Supreme Student Government is proud to announce the complete schedule for this year\'s Foundation Week, running from August 3–7. Expect a week of intramurals, cultural night, a talent showcase, and the much-awaited food fair organized by each grade level. Class representatives must submit their booth layout forms to the SSG office by July 28. Attendance for the opening program is mandatory for all students, and proper PE uniform is required for the sportsfest days. The week closes with the Foundation Day Assembly and awarding of the Spirit Cup to the section with the highest overall participation.', category:'ssg', priority:'high', date:'2026-07-20', author:'Alexa Reyes', image:true, imageData: LOGO_DATA_URI, bg:'blue', archiveDays:null,
      eventDate:'2026-08-03', startTime:'07:00', endTime:'17:00', venue:'School Covered Court', regLink:'', linkedEventId:'e1'},
    {id:'a2', type:'general', title:'Reminder: Submission of Clearance Forms', content:'All students are reminded that clearance forms for the first semester are due on July 25. Forms may be picked up from the Guidance Office and must be signed by all subject teachers, the class adviser, and the school librarian before submission. Late submissions may result in a hold on report card release. Please plan ahead and avoid the last-minute rush at the registrar\'s window.', category:'school', priority:'medium', date:'2026-07-18', author:'Registrar\'s Office', image:false, bg:'default', archiveDays:14},
    {id:'a3', type:'general', title:'Science Club: Robotics Workshop Sign-ups Open', content:'The Science and Technology Club is opening sign-ups for a two-day introductory robotics workshop, open to all interested Grade 9–12 students regardless of club membership. Sessions will cover basic circuitry, simple sensor programming, and a mini build challenge. Limited slots are available, so early registration through the club moderator is encouraged. No prior experience required, just curiosity.', category:'club', priority:'normal', date:'2026-07-17', author:'Sci-Tech Club', image:false, bg:'default', archiveDays:null},
    {id:'a4', type:'general', title:'Updated Guidelines on School ID Replacement', content:'Following several reported cases of lost IDs, the administration has streamlined the replacement process. Students must now file a request through their advisers, who will forward the list weekly to the ID office instead of individual walk-ins. Replacement fee remains at the standard rate and processing takes 3–5 school days.', category:'school', priority:'normal', date:'2026-07-15', author:'Admin Office', image:false, bg:'default', archiveDays:null},
    {id:'a5', type:'event', title:'SSG General Assembly: Midyear Report to the Student Body', content:'All class officers and interested students are invited to the SSG midyear general assembly, where the current administration will present a transparency report covering the budget utilization, ongoing projects, and plans for the second semester. An open forum will follow the presentation for questions and suggestions from the floor.', category:'ssg', priority:'medium', date:'2026-07-12', author:'Alexa Reyes', image:false, bg:'green', archiveDays:null,

function toast(msg){
  const t = document.getElementById('toast');

  t.classList.add('show');

}

function badgeClass(cat){ return {ssg:'badge-ssg', school:'badge-school', club:'badge-club'}[cat] || 'badge-school'; }
function priBadgeClass(p){ return {high:'badge-high', medium:'badge-medium', normal:'badge-normal'}[p] || 'badge-normal'; }
function fmtDate(d){ return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short', day:'numeric', year:'numeric'}); }
function excerpt(t,n=110){ return t.length>n ? t.slice(0,n).trim()+'…' : t; }
function fmtTime(t){ if(!t) return ''; const [h,m]=t.split(':').map(Number); const ap = h>=12?'PM':'AM'; const h12 = ((h%12)||12); return `${h12}:${String(m).padStart(2,'0')} ${ap}`; }

/* ---- Archive helpers ---- */
function isArchived(a){
  if(!a.archiveDays) return false;
  const posted = new Date(a.date+'T00:00:00');
  const cutoff = new Date(posted.getTime() + a.archiveDays*86400000);
  return new Date(TODAY_STR+'T00:00:00') > cutoff;
}
function daysUntilArchive(a){
  if(!a.archiveDays) return null;
  const posted = new Date(a.date+'T00:00:00');
  const cutoff = new Date(posted.getTime() + a.archiveDays*86400000);
  const diff = Math.ceil((cutoff - new Date(TODAY_STR+'T00:00:00'))/86400000);
  return diff;
}

/* ---- Event status helpers ---- */
function eventStatus(ev){
  const today = TODAY_STR;
  if(ev.date > today) return 'upcoming';
  if(ev.date === today) return 'ongoing';
  return 'completed';
}
function eventStatusLabel(s){ return {upcoming:'Upcoming', ongoing:'Ongoing', completed:'Completed'}[s]; }
function eventStatusBadge(ev){
  const s = eventStatus(ev);
  return `<span class="badge badge-${s}"><span class="status-dot ${s}"></span>${eventStatusLabel(s)}</span>`;
}

function annBgClass(a){ return (a.bg && a.bg!=='default') ? 'bg-'+a.bg : ''; }

function renderCategory(){
  const cat = state.params.cat || 'all';
  state.annCategory = cat;
  let list = DB.announcements.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(cat !== 'all') list = list.filter(a=>a.category===cat);
  if(state.annSearch.trim()){
    const q = state.annSearch.toLowerCase();
    list = list.filter(a=>a.title.toLowerCase().includes(q) || a.content.toLowerCase().includes(q));
  }
  const archivedCount = list.filter(isArchived).length;
  if(!state.annShowArchived) list = list.filter(a=>!isArchived(a));
  const total = list.length;
  const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if(state.annPage > totalPages) state.annPage = totalPages;
  const pageList = list.slice((state.annPage-1)*PAGE_SIZE, state.annPage*PAGE_SIZE);
  const title = cat==='all' ? 'All Announcements' : CAT_META[cat].title;

  return `
  <div class="page-hero">
    <div class="wrap">
      <button class="back-link" onclick="go('home')">←</button>
      <div><h1>${title}</h1><p>${cat==='all' ? 'Every announcement across SSG, School, and Club categories.' : CAT_META[cat].desc}</p></div>
    </div>
  </div>
  <section class="section wrap">
    <div class="ann-toolbar">
      <div class="search-box">
        <span class="icon">🔎</span>
        <input class="input" placeholder="Search announcements…" value="${state.annSearch}" oninput="state.annSearch=this.value; state.annPage=1; render();">
      </div>
      <select class="input" onchange="go('category',{cat:this.value})">
        <option value="all" ${cat==='all'?'selected':''}>All Categories</option>
        <option value="ssg" ${cat==='ssg'?'selected':''}>📢 SSG</option>
        <option value="school" ${cat==='school'?'selected':''}>🏫 School</option>
        <option value="club" ${cat==='club'?'selected':''}>🎭 Club</option>
      </select>
      <label class="archive-toggle"><input type="checkbox" ${state.annShowArchived?'checked':''} onchange="state.annShowArchived=this.checked; state.annPage=1; render();"> Show archived (${archivedCount})</label>
      ${canPost() ? `<button class="btn btn-primary btn-sm" onclick="openAnnouncementForm()">+ New Announcement</button>` : ''}
    </div>
    ${pageList.length===0 ? `
      <div class="empty-state">
        <div class="glyph">🗂️</div>
        <h3 style="margin-bottom:6px;">No announcements found</h3>
        <p>Try a different search term or category filter.</p>
      </div>
    ` : `
      <div class="ann-grid">
        ${pageList.map(a=>`
          <div class="ann-card ${annBgClass(a)}">
            ${a.imageData ? `<img src="${a.imageData}" alt="" style="width:calc(100% + 40px); margin:-20px -20px 0; max-height:150px; object-fit:cover; border-radius:16px 16px 0 0;">` : ''}
            <div class="ann-card-top">
              <span class="badge ${badgeClass(a.category)}">${CAT_META[a.category].icon} ${a.category.toUpperCase()}</span>
              <span class="ann-date">${fmtDate(a.date)}</span>
            </div>
            <h4>${a.title}</h4>
            <p class="ann-excerpt">${excerpt(a.content)}</p>
            <div style="display:flex; gap:6px; flex-wrap:wrap;">
              <span class="badge ${priBadgeClass(a.priority)}">${a.priority}</span>
              ${a.type==='event' ? `<span class="badge badge-medium">🗓️ Event · ${fmtDate(a.eventDate||a.date)}</span>` : ''}
              ${isArchived(a) ? `<span class="badge badge-archived">Archived</span>` : ''}

function selectAnnType(btn, type){
  document.querySelectorAll('#typeToggle button').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('eventFieldsWrap').style.display = type==='event' ? '' : 'none';
}
function selectSwatch(el){
  document.querySelectorAll('#bgSwatches .swatch').forEach(s=>s.classList.remove('sel'));
  el.classList.add('sel');
}
function previewAnnImage(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    document.getElementById('annImagePreview').src = reader.result;
    document.getElementById('annImagePreviewWrap').style.display = 'block';
    document.getElementById('annImageKeep').value = '1';
  };
  reader.readAsDataURL(file);
}
function removeAnnImage(){
  document.getElementById('annImageInput').value = '';
  document.getElementById('annImagePreview').src = '';
  document.getElementById('annImagePreviewWrap').style.display = 'none';
  document.getElementById('annImageKeep').value = '0';
}
function selectPill(btn, groupId){
  document.querySelectorAll(`#${groupId} .pill-opt`).forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}
function submitAnnouncementForm(e, id){
  e.preventDefault();
  const f = e.target;
  const title = f.title.value.trim();
  const content = f.content.value.trim();
  const cat = document.querySelector('#catPills .sel').dataset.cat;
  const pri = document.querySelector('#priPills .sel').dataset.pri;
  const type = document.querySelector('#typeToggle .sel').dataset.type;
  const bg = document.querySelector('#bgSwatches .sel').dataset.bg;
  const archiveDaysRaw = f.archiveDays.value;
  const archiveDays = archiveDaysRaw ? parseInt(archiveDaysRaw) : null;
  const keepImg = document.getElementById('annImageKeep').value === '1';
  const imageData = keepImg ? document.getElementById('annImagePreview').src : null;
  const eventFields = type==='event' ? {
    eventDate: f.eventDate.value || new Date().toISOString().slice(0,10),
    startTime: f.startTime.value || '',
    endTime: f.endTime.value || '',
    venue: f.venue.value.trim(),
    regLink: f.regLink.value.trim(),
  } : { eventDate:null, startTime:'', endTime:'', venue:'', regLink:'' };

  if(id){
    const a = DB.announcements.find(x=>x.id===id);
    a.title=title; a.content=content; a.category=cat; a.priority=pri; a.imageData=imageData; a.image=!!imageData;
    a.type=type; a.bg=bg; a.archiveDays=archiveDays;
    Object.assign(a, eventFields);
    syncAnnouncementEvent(a);
    logActivity('Edited Announcement', title);
    toast('Announcement updated.');
  } else {
    const a = {id:newId('a'), title, content, category:cat, priority:pri, date:new Date().toISOString().slice(0,10), author:state.currentUser.name, image:!!imageData, imageData, type, bg, archiveDays, linkedEventId:null, ...eventFields};
    DB.announcements.unshift(a);
    syncAnnouncementEvent(a);
    logActivity('Created Announcement', title);
    toast(type==='event' ? 'Event announcement published and added to Calendar.' : 'Announcement published.');
  }
  closeModal();
  render();
}
/* Keeps the Calendar of Events in sync with Event Announcements: creates, updates, or removes the linked calendar entry automatically. */
function syncAnnouncementEvent(a){
  if(a.type !== 'event'){
    if(a.linkedEventId){
      DB.events = DB.events.filter(x=>x.id!==a.linkedEventId);
      a.linkedEventId = null;
    }
    return;
  }
  if(a.linkedEventId){
    const ev = DB.events.find(x=>x.id===a.linkedEventId);
    if(ev){
      ev.title=a.title; ev.date=a.eventDate; ev.startTime=a.startTime; ev.endTime=a.endTime; ev.venue=a.venue; ev.desc=a.content; ev.coverImage=a.imageData;
      return;
    }
  }
  const newEv = {id:newId('e'), title:a.title, date:a.eventDate, startTime:a.startTime, endTime:a.endTime, venue:a.venue, desc:a.content, sourceAnnouncementId:a.id, coverImage:a.imageData};
  DB.events.push(newEv);
  a.linkedEventId = newEv.id;
}
function deleteAnnouncement(id){
  const a = DB.announcements.find(x=>x.id===id);
  if(!a) return;
  if(!confirm(`Delete "${a.title}"? This cannot be undone.`)) return;
  if(a.linkedEventId){ DB.events = DB.events.filter(x=>x.id!==a.linkedEventId); }
  DB.announcements = DB.announcements.filter(x=>x.id!==id);
  logActivity('Deleted Announcement', a.title);
  toast('Announcement deleted.');
  render();
}
function logActivity(action, target){
  DB.activity.unshift({id:newId('l'), user:state.currentUser.name, action, target, time: new Date().toLocaleString('en-US',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})});
}

/* =========================================================
   CALENDAR
   ========================================================= */
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function calendarWidget(homeMode=false){
  const y = state.calYear, m = state.calMonth;
  const first = new Date(y, m, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const todayStr = '2026-07-21';
  const monthEvents = DB.events.filter(e=>e.date.startsWith(`${y}-${String(m+1).padStart(2,'0')}`));
  const eventDays = new Set(monthEvents.map(e=>parseInt(e.date.slice(8,10))));
  let cells = '';
  for(let i=0;i<startDow;i++) cells += `<div class="cal-day blank"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasEvt = eventDays.has(d);
    const isToday = dateStr===todayStr;
    cells += `<div class="cal-day ${hasEvt?'has-event':''} ${isToday?'today':''}" ${hasEvt?`onclick="openEventsForDay('${dateStr}')"`:''}>${d}</div>`;
  }
  const upcoming = DB.events.slice().sort((a,b)=>new Date(a.date)-new Date(b.date)).filter(e=>new Date(e.date) >= new Date(TODAY_STR)).slice(0, homeMode?4:20);
  return `
  <div class="cal-wrap">
    <div class="cal-card">
      <div class="cal-head">
        <h3>${MONTH_NAMES[m]} ${y}</h3>
        <div class="cal-nav">
          <button onclick="shiftMonth(-1)">‹</button>
          <button onclick="shiftMonth(1)">›</button>
        </div>
      </div>
      <div class="cal-grid">
        ${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
    <div class="cal-card">
      <div class="cal-head"><h3>Upcoming Events</h3>${canPost() && !homeMode ? `<button class="btn btn-primary btn-sm" onclick="openEventForm()">+ Add Event</button>`:''}</div>
      ${upcoming.length ? upcoming.map(e=>`
        <div class="agenda-item" onclick="openEventModal('${e.id}')">
          <div class="agenda-date">${MONTH_NAMES[new Date(e.date+'T00:00:00').getMonth()].slice(0,3)} ${new Date(e.date+'T00:00:00').getDate()}</div>
          <div style="flex:1;">
            <div class="agenda-title">${e.title} ${e.sourceAnnouncementId?'<span style="font-size:10px; color:var(--blue-700);">🗓️ from announcement</span>':''}</div>
            <div class="agenda-desc">${excerpt(e.desc, 70)}</div>
            <div style="margin-top:4px;">${eventStatusBadge(e)}</div>
          </div>
        </div>
      `).join('') : `<p style="color:var(--ink-soft); font-size:13.5px;">No upcoming events this period.</p>`}
    </div>
  </div>`;
}
function shiftMonth(dir){
  state.calMonth += dir;
  if(state.calMonth<0){state.calMonth=11; state.calYear--;}
  if(state.calMonth>11){state.calMonth=0; state.calYear++;}
  render();
}
function renderCalendarPage(){
  return `
  <div class="page-hero">
    <div class="wrap">

      <div><h1>School Calendar of Events</h1><p>Open to the public — no login required to browse.</p></div>

function openEventsForDay(dateStr){

function openEventForm(id){

    <form onsubmit="submitEventForm(event,'${id||''}')">

      <div class="form-row field-2col">
        <div><label>Event Date</label><input class="input" type="date" name="date" required value="${editing?editing.date:'2026-08-01'}"></div>
        <div><label>Venue</label><input class="input" name="venue" value="${editing?editing.venue||'':''}"></div>
      </div>
      <div class="form-row field-2col">
        <div><label>Start Time</label><input class="input" type="time" name="startTime" value="${editing?editing.startTime||'':''}"></div>
        <div><label>End Time</label><input class="input" type="time" name="endTime" value="${editing?editing.endTime||'':''}"></div>
      </div>
      <div class="form-row"><label>Description</label><textarea name="desc" required>${editing?editing.desc:''}</textarea></div>
      <button class="btn btn-primary" type="submit" style="width:100%; justify-content:center;">${editing?'Save Changes':'Add Event'}</button>

  `);

function submitEventForm(e,id){
  e.preventDefault();
  const f = e.target;
  const title=f.title.value.trim(), date=f.date.value, desc=f.desc.value.trim();
  const venue=f.venue.value.trim(), startTime=f.startTime.value, endTime=f.endTime.value;
  if(id){
    const ev = DB.events.find(x=>x.id===id);
    ev.title=title; ev.date=date; ev.desc=desc; ev.venue=venue; ev.startTime=startTime; ev.endTime=endTime;
    logActivity('Edited Calendar Event', title);
    toast('Event updated.');
  } else {
    DB.events.push({id:newId('e'), title, date, desc, venue, startTime, endTime, sourceAnnouncementId:null});
    logActivity('Added Calendar Event', title);
    toast('Event added to calendar.');
  }
  closeModal(); render();
}
function deleteEvent(id){
  const ev = DB.events.find(x=>x.id===id);
  if(!confirm(`Delete event "${ev.title}"?`)) return;
  if(ev.sourceAnnouncementId){
    const a = DB.announcements.find(x=>x.id===ev.sourceAnnouncementId);
    if(a) a.linkedEventId = null;
  }
  DB.events = DB.events.filter(x=>x.id!==id);
  logActivity('Deleted Calendar Event', ev.title);
  toast('Event removed.');
  closeModal(); render();
}

/* Create / Edit form. If eventId is passed, this is "Create Memories Album" from a completed calendar event —
   the album is pre-filled from the event's title, cover image, date, and description. */
function openMemoryAlbumForm(id, eventId){
  const editing = id ? DB.memories.find(x=>x.id===id) : null;
  const fromEvent = eventId ? DB.events.find(x=>x.id===eventId) : null;
  const title = editing ? editing.title : (fromEvent ? fromEvent.title : '');
  const desc = editing ? editing.desc : (fromEvent ? fromEvent.desc : '');
  const date = editing ? editing.date : (fromEvent ? fromEvent.date : new Date().toISOString().slice(0,10));
  const cat = editing ? editing.category : 'ssg';
  const cover = editing ? editing.coverImage : (fromEvent ? fromEvent.coverImage : null);

          <p style="margin-top:6px;">Select one or more photos to add to the album gallery.</p>
        </div>

      </div>

function renderMemPhotoThumbs(){
  return (window._memPhotosDraft||[]).map((p,i)=>`<div class="photo-thumb"><img src="${p}"><button type="button" class="rm" onclick="removeMemPhoto(${i})">✕</button></div>`).join('');
}
function previewMemCover(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    document.getElementById('memCoverPreview').src = reader.result;
    document.getElementById('memCoverPreviewWrap').style.display = 'block';
  };
  reader.readAsDataURL(file);
}
function addMemPhotos(e){
  const files = Array.from(e.target.files || []);
  let pending = files.length;
  if(!pending) return;
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      window._memPhotosDraft = window._memPhotosDraft || [];
      window._memPhotosDraft.push(reader.result);
      document.getElementById('memPhotoThumbs').innerHTML = renderMemPhotoThumbs();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}
function removeMemPhoto(i){
  window._memPhotosDraft.splice(i,1);
  document.getElementById('memPhotoThumbs').innerHTML = renderMemPhotoThumbs();
}
function submitMemoryAlbumForm(e, id, eventId){
  e.preventDefault();
  const f = e.target;
  const title = f.title.value.trim();
  const date = f.date.value;
  const category = f.category.value;
  const desc = f.desc.value.trim();
  const coverPreview = document.getElementById('memCoverPreview');
  const coverImage = (coverPreview && coverPreview.src) ? coverPreview.src : null;
  const photos = (window._memPhotosDraft||[]).slice();
  if(id){
    const m = DB.memories.find(x=>x.id===id);
    m.title=title; m.date=date; m.category=category; m.desc=desc; m.coverImage=coverImage||m.coverImage; m.photos=photos;
    logActivity('Edited Memories Album', title);
    toast('Album updated.');
  } else {
    DB.memories.unshift({id:newId('m'), title, date, category, desc, coverImage, photos, author:state.currentUser.name, linkedEventId: eventId||null});
    logActivity(eventId ? 'Created Memories Album from Event' : 'Created Memories Album', title);
    toast('Memories album published.');
  }
  window._memPhotosDraft = [];
  closeModal(); render();
}
function deleteMemoryAlbum(id){
  const m = DB.memories.find(x=>x.id===id);
  if(!m) return;
  if(!confirm(`Delete album "${m.title}"? This cannot be undone.`)) return;
  DB.memories = DB.memories.filter(x=>x.id!==id);
  logActivity('Deleted Memories Album', m.title);
  toast('Album deleted.');
  if(state.view==='memoryAlbum') go('memories'); else render();
}

  const position = f.position.value.trim();
  const role = document.querySelector('#rolePills .sel').dataset.role;
  const username = f.username.value.trim();
  const password = f.password.value;
  if(DB.users.some(u=>u.username===username && u.id!==id)){
    toast('That username is already taken.'); return;
  }
  if(id){
    const u = DB.users.find(x=>x.id===id);
    u.name=name; u.position=position; u.role=role; u.username=username;
    if(password) u.password = password;
    logActivity('Edited User Account', name);
    toast('Account updated.');
  } else {
    DB.users.push({id:newId('u'), name, position, role, username, password});
    logActivity('Created User Account', name);
    toast('Account created.');
  }
  closeModal(); render();
}
function deleteUserAccount(id){
  const u = DB.users.find(x=>x.id===id);
  if(!u) return;
  if(!confirm(`Delete the account for "${u.name}"? This cannot be undone.`)) return;
  DB.users = DB.users.filter(x=>x.id!==id);
  logActivity('Deleted User Account', u.name);
  toast('Account deleted.');
  render();
}

function openSocialLinksForm(){
  const s = DB.settings.social;
  openModal(`
    <div class="modal-head"><h2 style="font-size:19px;">Edit Social Media Links</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <form onsubmit="submitSocialLinksForm(event)">
      <div class="form-row"><label>📘 Facebook URL</label><input class="input" name="facebook" placeholder="https://facebook.com/…" value="${s.facebook||''}"></div>
      <div class="form-row"><label>📸 Instagram URL</label><input class="input" name="instagram" placeholder="https://instagram.com/…" value="${s.instagram||''}"></div>
      <div class="form-row"><label>🐦 Twitter / X URL</label><input class="input" name="twitter" placeholder="https://x.com/…" value="${s.twitter||''}"></div>
      <p style="font-size:11.5px; color:var(--ink-soft); margin-bottom:12px;">Leave a field blank to hide that icon from the footer. Visible to Admins and Super Admins only.</p>
      <button class="btn btn-primary" type="submit" style="width:100%; justify-content:center;">Save Links</button>
    </form>
  `);
}
function submitSocialLinksForm(e){
  e.preventDefault();
  const f = e.target;
  DB.settings.social = { facebook:f.facebook.value.trim(), instagram:f.instagram.value.trim(), twitter:f.twitter.value.trim() };
  logActivity('Updated Social Media Links', 'Footer settings');
  toast('Social links updated.');
  closeModal(); render();
}
